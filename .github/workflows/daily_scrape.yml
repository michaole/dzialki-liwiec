name: Codzienny scraping

on:
  schedule:
    - cron: '0 20 * * *'   # 22:00 czasu polskiego (CEST UTC+2)
  workflow_dispatch:        # możliwość ręcznego uruchomienia

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # potrzebne do commitu seen_ids.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper job
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper_job.py

      - name: Commit updated seen_ids.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: aktualizacja seen_ids [skip ci]"
          file_pattern: data/seen_ids.json
